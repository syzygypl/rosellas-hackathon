<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Inventive Problem Solver — TRIZ MVP</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         max-width: 860px; margin: 0 auto; padding: 24px; line-height: 1.5; }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  p.sub { margin-top: 0; opacity: 0.7; }
  label { display: block; font-weight: 600; margin: 14px 0 4px; }
  textarea, input { width: 100%; padding: 8px 10px; font: inherit;
         border: 1px solid #8884; border-radius: 8px; background: #8881; }
  textarea { min-height: 56px; resize: vertical; }
  button { margin-top: 16px; padding: 10px 18px; font: inherit; font-weight: 600;
         border: 0; border-radius: 8px; background: #2563eb; color: #fff; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: wait; }
  .card { border: 1px solid #8883; border-radius: 12px; padding: 14px 18px; margin: 14px 0; }
  .card h2 { font-size: 1.05rem; margin: 0 0 8px; }
  .param { padding: 6px 0; border-bottom: 1px dashed #8883; }
  .param:last-child { border-bottom: 0; }
  .pid { display: inline-block; min-width: 34px; font-weight: 700; color: #2563eb; }
  pre { white-space: pre-wrap; word-wrap: break-word; font-size: 0.92rem;
        background: #8881; padding: 12px; border-radius: 8px; overflow-x: auto; }
  ol.trail { font-size: 0.9rem; opacity: 0.85; }
  .muted { opacity: 0.6; font-size: 0.85rem; }
</style>
</head>
<body>
  <h1>🧩 Inventive Problem Solver</h1>
  <p class="sub">Opisz problem — TRIZ sam wykryje sprzeczność techniczną i poda zasady wynalazcze z macierzy sprzeczności.</p>
  <p class="muted">Wskazówka: lokalny model embeddingów najlepiej mapuje konkretne, techniczne opisy (po angielsku działa najpewniej).</p>

  <label for="problem">Problem (opis sytuacji)</label>
  <textarea id="problem" placeholder="np. A delivery drone must fly longer between charges without becoming heavier."></textarea>

  <button id="go">Rozwiąż →</button>

  <div id="out"></div>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => (s ?? '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function paramLine(p) {
  return `<div class="param"><span class="pid">[${p.id}]</span> <strong>${esc(p.name)}</strong><br><span class="muted">${esc(p.description)}</span></div>`;
}

$('go').addEventListener('click', async () => {
  const btn = $('go');
  const body = { problem: $('problem').value };
  if (!body.problem.trim()) {
    alert('Opisz problem.');
    return;
  }
  btn.disabled = true; btn.textContent = 'Liczę…';
  $('out').innerHTML = '';
  try {
    const res = await fetch('/api/solve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status + ' ' + await res.text());
    const r = await res.json();
    render(r);
  } catch (e) {
    $('out').innerHTML = `<div class="card"><h2>Błąd</h2><pre>${esc(String(e))}</pre></div>`;
  } finally {
    btn.disabled = false; btn.textContent = 'Rozwiąż →';
  }
});

function render(r) {
  $('out').innerHTML = `
    <div class="card">
      <h2>🔎 Wykryte parametry TRIZ</h2>
      <div class="muted">Parametry inżynierskie dopasowane do problemu (malejąco wg trafności):</div>
      ${(r.detectedParameters || []).map(paramLine).join('') || '<em>brak dopasowania</em>'}
    </div>
    <div class="card">
      <h2>⚙️ Zbudowana sprzeczność techniczna</h2>
      <div>${esc(r.contradiction)}</div>
    </div>
    <div class="card">
      <h2>💡 Zasady wynalazcze z macierzy sprzeczności</h2>
      <pre>${esc(r.principlesFromMatrix)}</pre>
    </div>
    <div class="card">
      <h2>🔎 Powiązane zasady (dodatkowe kierunki)</h2>
      <pre>${esc(r.relatedPrinciples)}</pre>
    </div>
    <div class="card">
      <h2>🧭 Ślad rozumowania</h2>
      <ol class="trail">${r.trail.map(t => `<li>${esc(t)}</li>`).join('')}</ol>
    </div>`;
}
</script>
</body>
</html>
