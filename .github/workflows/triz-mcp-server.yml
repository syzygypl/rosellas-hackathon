name: triz-mcp-server

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/triz-mcp-server/**'
      - 'package.json'
      - 'nx.json'
      - '.github/workflows/triz-mcp-server.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ARTIFACT_REPOSITORY: cloud-run-apps
  CLOUD_BUILD_SOURCE_BUCKET: ${{ vars.CLOUD_BUILD_SOURCE_BUCKET || 'crud-hackathon-ml-20260703-github-cloud-build-source' }}
  IMAGE_NAME: triz-mcp-server
  MCP_SERVICE: triz-mcp-server
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION || 'europe-west1' }}

jobs:
  deploy:
    name: Build and deploy triz-mcp-server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate configuration
        run: |
          test -n "$PROJECT_ID"
          test -n "${{ vars.WIF_PROVIDER }}"
          test -n "${{ vars.GCP_SERVICE_ACCOUNT }}"
          test -n "${{ vars.EMBEDDING_SERVICE_URL }}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Check triz-mcp-server sources
        run: PYTHONPYCACHEPREFIX=/tmp/rosellas-python-cache python3 -m compileall -q apps/triz-mcp-server/app

      - name: Build and publish triz-mcp-server image
        run: |
          IMAGE="$REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REPOSITORY/$IMAGE_NAME:$GITHUB_SHA"
          BUILD_ID="$(gcloud builds submit . \
            --config apps/triz-mcp-server/cloudbuild.yaml \
            --gcs-source-staging-dir "gs://$CLOUD_BUILD_SOURCE_BUCKET/source" \
            --gcs-log-dir "gs://$CLOUD_BUILD_SOURCE_BUCKET/logs" \
            --substitutions "_IMAGE=$IMAGE" \
            --async \
            --format='value(id)' \
            --project "$PROJECT_ID")"

          echo "Cloud Build: https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=$PROJECT_ID"
          for _ in {1..120}; do
            STATUS="$(gcloud builds describe "$BUILD_ID" \
              --project "$PROJECT_ID" \
              --format='value(status)')"

            echo "Cloud Build status: $STATUS"
            case "$STATUS" in
              SUCCESS)
                break
                ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                exit 1
                ;;
            esac

            sleep 5
          done

          test "$STATUS" = "SUCCESS"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy triz-mcp-server to Cloud Run
        env:
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY || vars.EMBEDDING_API_KEY || 'ollama' }}
          EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL || 'embeddinggemma:300m' }}
          EMBEDDING_SERVICE_URL: ${{ vars.EMBEDDING_SERVICE_URL }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          values = {
              "MCP_HOST": "0.0.0.0",
              "MCP_PORT": "8080",
              "EMBEDDING_MODEL": os.environ["EMBEDDING_MODEL"],
              "EMBEDDING_SERVICE_URL": os.environ["EMBEDDING_SERVICE_URL"],
              "EMBEDDING_API_KEY": os.environ["EMBEDDING_API_KEY"],
          }

          Path("/tmp/triz-mcp-env.yaml").write_text(
              "\n".join(f"{key}: {json.dumps(value)}" for key, value in values.items()) + "\n"
          )
          PY

          gcloud run deploy "$MCP_SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --allow-unauthenticated \
            --env-vars-file /tmp/triz-mcp-env.yaml \
            --quiet
