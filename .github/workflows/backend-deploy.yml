name: Backend Deploy

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/general-ai-agent/**'
      - 'package.json'
      - 'package-lock.json'
      - 'nx.json'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ARTIFACT_REPOSITORY: cloud-run-apps
  BACKEND_SERVICE: general-ai-agent
  CLOUD_BUILD_SOURCE_BUCKET: ${{ vars.CLOUD_BUILD_SOURCE_BUCKET || 'crud-hackathon-ml-20260703-github-cloud-build-source' }}
  FRONTEND_SERVICE: customer-portal
  IMAGE_NAME: general-ai-agent
  PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER || '59918194944' }}
  REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}

jobs:
  deploy:
    name: Build and deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate configuration
        run: |
          test -n "$PROJECT_ID"
          test -n "${{ vars.WIF_PROVIDER }}"
          test -n "${{ vars.GCP_SERVICE_ACCOUNT }}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Build backend
        run: |
          npm ci
          npm run build:backend

      - name: Build and publish backend image
        run: |
          IMAGE="$REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REPOSITORY/$IMAGE_NAME:$GITHUB_SHA"
          BUILD_ID="$(gcloud builds submit . \
            --config apps/general-ai-agent/cloudbuild.yaml \
            --gcs-source-staging-dir "gs://$CLOUD_BUILD_SOURCE_BUCKET/source" \
            --gcs-log-dir "gs://$CLOUD_BUILD_SOURCE_BUCKET/logs" \
            --substitutions "_IMAGE=$IMAGE" \
            --async \
            --format='value(id)' \
            --project "$PROJECT_ID")"

          echo "Cloud Build: https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=$PROJECT_ID"
          for _ in {1..120}; do
            STATUS="$(gcloud builds describe "$BUILD_ID" \
              --project "$PROJECT_ID" \
              --format='value(status)')"

            echo "Cloud Build status: $STATUS"
            case "$STATUS" in
              SUCCESS)
                break
                ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                exit 1
                ;;
            esac

            sleep 5
          done

          test "$STATUS" = "SUCCESS"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Resolve backend environment
        run: |
          ENV_VARS="^@^MCP_URL=${{ vars.MCP_URL }}"

          if FRONTEND_URL="$(gcloud run services describe "$FRONTEND_SERVICE" \
              --region "$REGION" \
              --project "$PROJECT_ID" \
              --format='value(status.url)' 2>/dev/null)"; then
            REGIONAL_URL="https://$FRONTEND_SERVICE-$PROJECT_NUMBER.$REGION.run.app"

            if [ "$FRONTEND_URL" = "$REGIONAL_URL" ]; then
              CORS_ORIGIN="$FRONTEND_URL"
            else
              CORS_ORIGIN="$FRONTEND_URL,$REGIONAL_URL"
            fi

            ENV_VARS="$ENV_VARS@CORS_ORIGIN=$CORS_ORIGIN"
          fi

          echo "BACKEND_ENV_VARS=$ENV_VARS" >> "$GITHUB_ENV"

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy "$BACKEND_SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --allow-unauthenticated \
            --set-env-vars "$BACKEND_ENV_VARS" \
            --quiet
