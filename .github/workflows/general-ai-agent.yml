name: general-ai-agent

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/general-ai-agent/**'
      - 'package.json'
      - 'package-lock.json'
      - 'nx.json'
      - '.github/workflows/general-ai-agent.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ARTIFACT_REPOSITORY: cloud-run-apps
  BACKEND_SERVICE: general-ai-agent
  CLOUD_BUILD_SOURCE_BUCKET: ${{ vars.CLOUD_BUILD_SOURCE_BUCKET || 'crud-hackathon-ml-20260703-github-cloud-build-source' }}
  FRONTEND_SERVICE: customer-portal
  IMAGE_NAME: general-ai-agent
  MCP_SERVICE: triz-mcp-server
  MCP_URL: ${{ vars.MCP_URL || '' }}
  SCAMPER_MCP_SERVICE: scamper-mcp-server
  PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER || '59918194944' }}
  REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}

jobs:
  deploy:
    name: Build and deploy general-ai-agent
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate configuration
        run: |
          test -n "$PROJECT_ID"
          test -n "${{ vars.WIF_PROVIDER }}"
          test -n "${{ vars.GCP_SERVICE_ACCOUNT }}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Build general-ai-agent
        run: |
          APP_VERSION="$(node -p "require('./package.json').version")"
          BUILD_TIME="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$BUILD_TIME" >> "$GITHUB_ENV"
          npm ci
          npm run build:backend

      - name: Build and publish general-ai-agent image
        run: |
          IMAGE="$REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REPOSITORY/$IMAGE_NAME:$GITHUB_SHA"
          BUILD_ID="$(gcloud builds submit . \
            --config apps/general-ai-agent/cloudbuild.yaml \
            --gcs-source-staging-dir "gs://$CLOUD_BUILD_SOURCE_BUCKET/source" \
            --gcs-log-dir "gs://$CLOUD_BUILD_SOURCE_BUCKET/logs" \
            --substitutions "_IMAGE=$IMAGE" \
            --async \
            --format='value(id)' \
            --project "$PROJECT_ID")"

          echo "Cloud Build: https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=$PROJECT_ID"
          for _ in {1..120}; do
            STATUS="$(gcloud builds describe "$BUILD_ID" \
              --project "$PROJECT_ID" \
              --format='value(status)')"

            echo "Cloud Build status: $STATUS"
            case "$STATUS" in
              SUCCESS)
                break
                ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                exit 1
                ;;
            esac

            sleep 5
          done

          test "$STATUS" = "SUCCESS"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Resolve general-ai-agent environment
        run: |
          if [ -n "$MCP_URL" ]; then
            echo "Using MCP_URL from repository variables."
          else
            REGIONAL_MCP_URL="https://$MCP_SERVICE-$PROJECT_NUMBER.$REGION.run.app"
            if MCP_SERVICE_URL="$(gcloud run services describe "$MCP_SERVICE" \
                --region "$REGION" \
                --project "$PROJECT_ID" \
                --format='value(status.url)' 2>/dev/null)"; then
              echo "Resolved MCP service URL: $MCP_SERVICE_URL"
              echo "Using regional MCP URL: $REGIONAL_MCP_URL"
            else
              echo "MCP service not found yet; using regional URL: $REGIONAL_MCP_URL"
            fi

            MCP_URL="${REGIONAL_MCP_URL%/}/mcp"
          fi

          SCAMPER_MCP_URL="${{ vars.SCAMPER_MCP_URL }}"
          if [ -n "$SCAMPER_MCP_URL" ]; then
            echo "Using SCAMPER_MCP_URL from repository variables."
          else
            REGIONAL_SCAMPER_MCP_URL="https://$SCAMPER_MCP_SERVICE-$PROJECT_NUMBER.$REGION.run.app"
            if SCAMPER_MCP_SERVICE_URL="$(gcloud run services describe "$SCAMPER_MCP_SERVICE" \
                --region "$REGION" \
                --project "$PROJECT_ID" \
                --format='value(status.url)' 2>/dev/null)"; then
              echo "Resolved SCAMPER MCP service URL: $SCAMPER_MCP_SERVICE_URL"
              echo "Using regional SCAMPER MCP URL: $REGIONAL_SCAMPER_MCP_URL"
            else
              echo "SCAMPER MCP service not found yet; using regional URL: $REGIONAL_SCAMPER_MCP_URL"
            fi

            SCAMPER_MCP_URL="${REGIONAL_SCAMPER_MCP_URL%/}/mcp"
          fi

          ENV_VARS="^@^MCP_URL=$MCP_URL@SCAMPER_MCP_URL=$SCAMPER_MCP_URL@GOOGLE_CLOUD_PROJECT=$PROJECT_ID@APP_VERSION=$APP_VERSION@GIT_SHA=$GITHUB_SHA@BUILD_TIME=$BUILD_TIME@LOG_LEVEL=INFO"
          CORS_ORIGIN=""

          append_cors_origin() {
            local origin="$1"

            if [ -z "$origin" ]; then
              return
            fi

            if [ -n "$CORS_ORIGIN" ]; then
              CORS_ORIGIN="$CORS_ORIGIN,$origin"
            else
              CORS_ORIGIN="$origin"
            fi
          }

          if FRONTEND_URL="$(gcloud run services describe "$FRONTEND_SERVICE" \
              --region "$REGION" \
              --project "$PROJECT_ID" \
              --format='value(status.url)' 2>/dev/null)"; then
            append_cors_origin "$FRONTEND_URL"
          fi

          if [ -n "$CORS_ORIGIN" ]; then
            ENV_VARS="$ENV_VARS@CORS_ORIGIN=$CORS_ORIGIN"
          fi

          # Deep Agent chat: optional — without a compatible key the backend
          # serves the LLM-free pipeline and returns a configuration warning.
          OPENAI_COMPATIBLE_API_KEY=""
          if [ -n "${{ secrets.OPENAI_API_KEY }}" ]; then
            OPENAI_COMPATIBLE_API_KEY="${{ secrets.OPENAI_API_KEY }}"
            echo "Using OPENAI_API_KEY for the Deep Agent chat."
          elif [ -n "${{ secrets.EMBEDDING_API_KEY }}" ]; then
            OPENAI_COMPATIBLE_API_KEY="${{ secrets.EMBEDDING_API_KEY }}"
            echo "OPENAI_API_KEY secret not set; using EMBEDDING_API_KEY for the Deep Agent chat."
          elif [ -n "${{ secrets.OPEN_AI_API_KEY }}" ]; then
            OPENAI_COMPATIBLE_API_KEY="${{ secrets.OPEN_AI_API_KEY }}"
            echo "OPENAI_API_KEY secret not set; using OPEN_AI_API_KEY for the Deep Agent chat."
          fi

          if [ -n "$OPENAI_COMPATIBLE_API_KEY" ]; then
            ENV_VARS="$ENV_VARS@OPENAI_API_KEY=$OPENAI_COMPATIBLE_API_KEY"
            ENV_VARS="$ENV_VARS@OPENAI_MODEL=${{ vars.OPENAI_MODEL || 'gpt-5.5' }}"
            ENV_VARS="$ENV_VARS@OPENAI_REASONING_EFFORT=${{ vars.OPENAI_REASONING_EFFORT || 'low' }}"
          else
            echo "No OpenAI-compatible API key secret set; deploying without the Deep Agent chat."
          fi

          # Langfuse tracing: optional. Both public and secret keys are required.
          if [ -n "${{ vars.LANGFUSE_PUBLIC_KEY }}" ] && [ -n "${{ secrets.LANGFUSE_SECRET_KEY }}" ]; then
            ENV_VARS="$ENV_VARS@LANGFUSE_PUBLIC_KEY=${{ vars.LANGFUSE_PUBLIC_KEY }}"
            ENV_VARS="$ENV_VARS@LANGFUSE_SECRET_KEY=${{ secrets.LANGFUSE_SECRET_KEY }}"
            ENV_VARS="$ENV_VARS@LANGFUSE_BASE_URL=${{ vars.LANGFUSE_BASE_URL || 'https://cloud.langfuse.com' }}"
            ENV_VARS="$ENV_VARS@LANGFUSE_TRACING_ENVIRONMENT=${{ vars.LANGFUSE_TRACING_ENVIRONMENT || 'production' }}"
            ENV_VARS="$ENV_VARS@LANGCHAIN_CALLBACKS_BACKGROUND=false"
          else
            echo "Langfuse keys not set; deploying without Langfuse tracing."
          fi

          echo "BACKEND_ENV_VARS=$ENV_VARS" >> "$GITHUB_ENV"

      - name: Deploy general-ai-agent to Cloud Run
        run: |
          gcloud run deploy "$BACKEND_SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --allow-unauthenticated \
            --set-env-vars "$BACKEND_ENV_VARS" \
            --quiet
